name: Daily Digest

on:
  schedule:
    # Runs every 8 hours so the runner can serve users with different digest times.
    # Each user's digest_time field controls when they actually receive their email.
    # Use https://crontab.guru to build your expression.
    - cron: "0 */8 * * *"
  workflow_dispatch: # Allow manual runs from the GitHub Actions UI

jobs:
  send-digest:
    name: Run Pipeline & Send Email
    runs-on: ubuntu-latest

    # Shared env vars available to every step
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DIGEST_RECIPIENT_EMAIL: ${{ secrets.DIGEST_RECIPIENT_EMAIL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      # nick-fields/retry handles Neon cold-start timeouts cleanly.
      # Each db step retries up to 3 times with a 5s pause between attempts.
      - name: Run database migrations
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 5
          timeout_minutes: 3
          command: uv run alembic upgrade head

      - name: Seed database sources
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 5
          timeout_minutes: 3
          command: uv run python scripts/seed_sources.py

      - name: Seed default user
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 5
          timeout_minutes: 3
          command: uv run python scripts/seed_user.py

      - name: Run DailyDigest pipeline
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 5
          timeout_minutes: 10
          command: uv run python main.py
